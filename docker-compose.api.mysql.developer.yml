services:
  db:
    image: mysql:8.4
    container_name: nba_h2h_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "9000:3306"
    volumes:
      - nba_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: nba_h2h_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      DATABASE_ENGINE: mysql
      DATABASE_URL: "mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  nba_mysql_data:
    name: nba_h2h_mysql_data
