services:
  db:
    image: postgres:17-alpine
    container_name: nba_h2h_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "9001:5432"
    volumes:
      - nba_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: nba_h2h_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    environment:
      DATABASE_ENGINE: postgresql
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  nba_postgres_data:
    name: nba_h2h_postgres_data
