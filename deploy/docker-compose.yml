services:
  api:
    image: ${DOCKER_IMAGE:-your-dockerhub-username/nba-statics-api:latest}
    container_name: nba_h2h_api_prod
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Obrigatórios — a aplicação falha no startup se ausentes
      DATABASE_URL: ${DATABASE_URL}
      API_KEY: ${API_KEY}
      # Opcionais com valores padrão
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-30}
      NBA_STATS_BASE_URL: ${NBA_STATS_BASE_URL:-https://stats.nba.com/stats}
      NBA_REQUEST_DELAY_MS: ${NBA_REQUEST_DELAY_MS:-700}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
