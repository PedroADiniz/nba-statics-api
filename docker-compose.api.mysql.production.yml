services:
  db:
    image: mysql:8.4
    container_name: nba_h2h_db
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - nba_mysql_data:/var/lib/mysql
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    image: pedroadiniz/nba-statics-api-mysql:latest
    container_name: nba_h2h_api
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - db_net
      - public_net

networks:
  db_net:
    internal: true
  public_net:

volumes:
  nba_mysql_data:
    name: nba_h2h_mysql_data
