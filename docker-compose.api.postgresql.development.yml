services:
  db:
    image: postgres:18-alpine
    container_name: nba_h2h_postgresql_development
    restart: unless-stopped
    env_file: .env.development
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - nba_postgres_data_development:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      args:
        DATABASE_ENGINE: postgresql
    container_name: nba_h2h_api_postgresql_development
    restart: unless-stopped
    env_file: .env.development
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  nba_postgres_data_development:
    name: nba_postgres_data_development
